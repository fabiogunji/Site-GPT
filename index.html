<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE GPT</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button class="toggle-theme" id="toggleTheme">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="barra-lateral"></div>

    <main class="container">

        <div class="icone-robo">
            <i class="fa-solid fa-robot"></i>
        </div>

        <h1>SITE-GPT</h1>

        <!-- formulário -->
        <form id="chatForm">

            <div class="busca-area">

                <!-- campo pergunta -->
                <input type="text" id="pergunta" name="pergunta" placeholder="Digite sua pergunta..." autocomplete="off"
                    required>

                <!-- botão enviar -->
                <button type="submit" class="send-btn" title="Enviar pergunta">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

                <!-- botão microfone -->

                <button type="button" class="mic-btn" id="micBtn" title="Falar pergunta">
                    <i class="fa-solid fa-microphone"></i>
                </button>

            </div>
            <div class="d-flex justify-content-center align-items-center gap-3 mt-3">

                <span class="fw-bold">ChatGPT</span>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="apiSwitch"
                        style=" width:60px;height:30px;cursor:pointer;">
                </div>

                <span class="fw-bold">Gemini</span>

            </div>

            <div id="loading" style="display:none; font-weight:bold; margin-bottom:10px;"></div>

        </form>

        <!-- área de resposta -->
        <section class="resposta-box">

            <h3>Resposta:</h3>

            <!-- loading -->
            <div id="loading" style="display:none;">
                Consultando ChatGPT AI...
            </div>


            <!-- resposta -->
            <div id="respostaTexto">
            </div>

        </section>

        <!-- chama javascript -->
        <script src="script.js"></script>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
