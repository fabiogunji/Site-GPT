<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE GPT</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button class="toggle-theme" id="toggleTheme">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="barra-lateral"></div>

    <main class="container">

        <div class="icone-robo">
            <i class="fa-solid fa-robot"></i>
        </div>

        <h1>SITE-GPT</h1>

        <!-- formulário -->
        <form id="chatForm">

            <div class="busca-area">

                <!-- campo pergunta -->
                <input type="text" id="pergunta" name="pergunta" placeholder="Digite sua pergunta..." autocomplete="off"
                    required>

                <!-- botão enviar -->
                <button type="submit" class="send-btn" title="Enviar pergunta">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

                <!-- botão microfone -->
                
                <button type="button" class="mic-btn" id="micBtn" title="Falar pergunta">
                    <i class="fa-solid fa-microphone"></i>
                </button>

            </div>
            <div class="api-toggle">
                <span class="label">Azure</span>

                <label class="switch">
                    <input type="checkbox" id="apiSwitch">
                    <span class="slider"></span>
                </label>

                <span class="label">Gemini</span>
            </div>

            <div id="loading" style="display:none; font-weight:bold; margin-bottom:10px;"></div>      

        </form>    

        <!-- área de resposta -->
        <section class="resposta-box">

            <h2>Resposta</h2>

            <!-- loading -->
            <div id="loading" style="display:none;">
                Consultando Azure AI...
            </div>
            
            
            <!-- resposta -->
            <div id="respostaTexto">
            </div>

        </section>

        <!-- chama javascript -->
        <script src="script.js"></script>
    </main>

</body>

</html>
