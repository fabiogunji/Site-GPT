<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENAI GPT</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>
<body>

<button class="toggle-theme" id="toggleTheme">
    <i class="fa-solid fa-moon"></i>
</button>

<div class="barra-lateral"></div>

<main class="container">

    <div class="icone-robo">
        <i class="fa-solid fa-robot"></i>
    </div>

    <h1>SENAI-GPT</h1>

    <!-- formulário -->
    <form id="chatForm">

        <div class="busca-area">
            <input
                type="text"
                id="pergunta"
                placeholder="Digite sua pergunta..."
                required
            >

            <!-- botão submit -->
            <button type="submit" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
            <button type="button" class="mic-btn">
                <i class="fa-solid fa-microphone"></i>
            </button>
        </div>

        <button class="btn-senai">SENAI</button>

    </form>

    <!-- resposta -->
    <section class="resposta-box" id="respostaBox">
        <h2>Resposta:</h2>
        <p id="respostaTexto"></p>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
